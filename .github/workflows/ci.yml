# Per-push CI (design doc 16). Trunk-based: this is the net, not the gate —
# a red main is fix-forward-within-the-hour or revert.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # clang-format pinned to the same version as local tooling (doc 16).
      - run: pip install clang-format==19.1.7
      - name: format
        run: git ls-files '*.cpp' '*.hpp' | xargs -r clang-format --dry-run -Werror
      - name: levelization
        run: python3 scripts/check_levels.py
      - name: claims register
        run: python3 scripts/check_claims.py
      # RT-safety grep-lint (audio.rt_safety, doc 16:194-198, Decision D5): the
      # non-Clang backstop for the ARBC_RT_NONBLOCKING call graph -- catches a
      # forbidden token (new/malloc/lock/shared_ptr) in an annotated function on
      # every push, even the GCC/MSVC matrix members that carry no RealtimeSanitizer.
      - name: rt-safety lint
        run: python3 scripts/check_rt_safety.py
      # Worker-dispatch grep-lint (runtime.worker_dispatch_leaf_only, doc 02
      # § Threading model): worker dispatch is leaf-only, and the rule lives in
      # exactly one helper. A second hand-rolled `RenderTask` submission -- which
      # compiles, does not assert, and races the tile cache only under TSan or in
      # the field -- fails the build here.
      - name: worker-dispatch lint
        run: python3 scripts/check_worker_dispatch.py

  build-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: gcc-debug, os: ubuntu-latest, cxx: g++, preset: dev }
          - { name: gcc-release, os: ubuntu-latest, cxx: g++, preset: release }
          # clang lanes pin clang 20: `-fsanitize=realtime` (rtsan lane) needs
          # LLVM >= 20 -- clang 18 rejects the flag outright -- and the other
          # clang lanes ride the same version so one toolchain covers all
          # three. The "install clang-20" step below provisions it from
          # apt.llvm.org when the runner doesn't already have it.
          - { name: clang-debug, os: ubuntu-latest, cxx: clang++-20, preset: dev }
          - { name: clang-asan, os: ubuntu-latest, cxx: clang++-20, preset: asan }
          # TSan lane (doc 16:66,101-103): the full suite short-form under
          # ThreadSanitizer -- ASan cannot detect data races. gcc's TSan is
          # complete and composes with the mprotect/SIGSEGV/fork crash harness
          # (validated green), so no test is excluded; the hidden `[.nightly]`
          # wide seed-sweeps are auto-excluded from ctest and run in nightly.
          - { name: gcc-tsan, os: ubuntu-latest, cxx: g++, preset: tsan }
          # RealtimeSanitizer lane (audio.rt_safety, doc 16:70-73, Decision D1
          # Layer A): Clang builds + runs the tiers under `-fsanitize=realtime`
          # so the `[[clang::nonblocking]]` annotations on the device RT callback
          # chain fire at runtime -- any lock/allocation/blocking syscall in the
          # annotated graph is a failure. RTSan is Clang-only, so this rides the
          # clang lane; GCC/MSVC keep Layer B + the grep-lint.
          - { name: clang-rtsan, os: ubuntu-latest, cxx: clang++-20, preset: rtsan }
          # The OTHER zstd consumption path (quality.testing_artifact; the
          # CMakeLists zstd block asks for both to be exercised). Every lane above
          # is find-first, so a machine with a system zstd never proves the pinned
          # FetchContent copy works -- and the two paths install DIFFERENTLY: a
          # system zstd becomes a find_dependency(zstd 1.5) in the generated package
          # config, while the fetched static copy is installed nowhere and so has its
          # objects folded into libarbc.a instead. The `install.consumer` CTest test
          # links a foreign project against the staged prefix, so it is that
          # difference this lane actually checks.
          - { name: gcc-install-fetched, os: ubuntu-latest, cxx: g++, preset: install-fetched }
          # BUILD_SHARED_LIBS=ON lane (packaging.shared_library_build, doc 17:173-191):
          # builds libarbc.so under the global -fvisibility=hidden and runs the full
          # suite against it, so the shared build stays green on every push -- including
          # the new shared_symbol_resolution proof and the eight plugin loads re-run
          # against the shared libarbc. Find-first (system) zstd, so libzstd is an
          # ordinary .so dependency (Decision D4/D7). (Windows/MSVC lanes were
          # removed: MSVC/cl.exe is no longer a supported toolchain -- a Windows
          # build, if attempted, uses Clang, which the Linux clang lanes cover.)
          - { name: gcc-shared, os: ubuntu-latest, cxx: g++, preset: shared }
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Skipped when clang-20 is already present (e.g. the local act runner
      # image pre-installs it, keeping orchestrator iterations offline-fast).
      - name: install clang-20
        if: runner.os == 'Linux' && startsWith(matrix.cxx, 'clang')
        run: |
          if ! command -v ${{ matrix.cxx }} >/dev/null 2>&1; then
            wget -q https://apt.llvm.org/llvm.sh
            chmod +x llvm.sh
            sudo ./llvm.sh 20
            sudo apt-get install -y libclang-rt-20-dev
          fi
      # gcc-shared must resolve a SYSTEM zstd so the crashing combination -- system
      # zstd x shared libarbc -- is the one under test (shared_library_zstd_shared_link
      # Decision D3). Without libzstd-dev present, find_package(zstd) misses and the
      # lane silently folds the fetched PIC static, never reproducing the non-PIC
      # SIGSEGV in ZSTD_decompress that this fix guards against.
      - name: install libzstd-dev (gcc-shared)
        if: matrix.name == 'gcc-shared'
        run: sudo apt-get install -y libzstd-dev
      - name: configure
        shell: bash
        run: |
          if [[ -n "${{ matrix.cxx }}" ]]; then export CXX="${{ matrix.cxx }}"; fi
          cmake --preset ${{ matrix.preset }}
      - name: build
        run: cmake --build --preset ${{ matrix.preset }} --parallel 4
      # VERIFY_INTERFACE_HEADER_SETS (packaging.install Decision D5, doc 17:223-226):
      # compile every public header of `arbc` and `arbc-testing` standalone. Setting the
      # property only creates the verify target -- it is inert until built -- so a SINGLE
      # gcc lane pays for the gate while every other lane's ordinary build is untouched.
      - name: verify interface header sets
        if: matrix.name == 'gcc-debug'
        run: cmake --build --preset ${{ matrix.preset }} --parallel 4
             --target all_verify_interface_header_sets
      - name: test
        run: ctest --preset ${{ matrix.preset }}

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install gcovr diff-cover
      - name: configure
        run: CXX=g++ cmake --preset coverage
      - name: build
        run: cmake --build --preset coverage --parallel 4
      - name: test
        run: ctest --preset coverage
      - name: coverage report
        run: gcovr --root . --filter 'src/' --xml -o coverage.xml
          --gcov-ignore-parse-errors=negative_hits.warn_once_per_file
          build/coverage/src build/coverage/tests
      # Hard diff-coverage gate on changed lines (doc 16). Skipped when no
      # comparable base exists (first push, forced push).
      - name: diff coverage gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="origin/${{ github.base_ref }}"
          elif [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]] \
               && git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            base="${{ github.event.before }}"
          else
            echo "no comparable base; skipping diff-coverage gate"
            exit 0
          fi
          diff-cover coverage.xml --compare-branch="$base" --fail-under=90
