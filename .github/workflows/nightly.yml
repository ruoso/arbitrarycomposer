# Nightly long-form checks (design doc 16).
# TODO as the codebase grows: Valgrind, benchmark runs with tracked history, and
# the full claims-register audit.
name: Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  # clang-tidy runs nightly until the baseline is clean, then promotes to
  # per-push (doc 16).
  tidy:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install clang-tidy==19.1.0
      - name: configure
        run: CXX=clang++-18 cmake --preset dev
      - name: tidy
        run: |
          git ls-files 'src/**/*.cpp' | xargs -r clang-tidy -p build/dev

  asan-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: configure
        run: CXX=clang++-18 cmake --preset asan
      - name: build
        run: cmake --build --preset asan --parallel 4
      - name: test
        run: ctest --preset asan

  # Long-form ThreadSanitizer stress (doc 16:104-105). The full suite runs
  # short-form under TSan per-push (ci.yml gcc-tsan); here the seeded
  # schedule-perturbation stress/litmus binaries run their hidden `[.nightly]`
  # wide seed-sweeps, which catch_discover_tests does not register with ctest.
  tsan-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: configure
        run: CXX=g++ cmake --preset tsan
      - name: build
        run: cmake --build --preset tsan --parallel 4
      - name: test (full suite short-form)
        run: ctest --preset tsan
      - name: long-form seeded schedule-perturbation sweep
        run: |
          for t in stress_publish_pin stress_reclamation_queue arena_growth_litmus; do
            echo "== $t [.nightly] =="
            ./build/tsan/tests/arbc_${t}_t "[.nightly]"
          done

  # Coverage-guided libFuzzer over the .arbc JSON loader (doc 16:79 "long" run,
  # serialize.format_tests Decision D1). The per-push brief run is the portable
  # corpus-replay ctest (ci.yml, gcc + ASan); this clang-only lane grows the corpus
  # and hunts for crashes / determinism breaks the checked-in seeds do not yet cover.
  # -fsanitize=fuzzer is clang-only, so the job self-skips cleanly when clang is
  # absent -- the ASan corpus-replay lane remains the enforced safety net (Constraint 4).
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: check clang availability
        id: clang
        run: |
          if command -v clang++-18 >/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "clang++-18 not found -- skipping the coverage-guided fuzz lane (the ASan corpus-replay lane still enforces loader safety per-push)."
          fi
      - name: configure
        if: steps.clang.outputs.available == 'true'
        run: CXX=clang++-18 cmake --preset fuzz
      - name: build
        if: steps.clang.outputs.available == 'true'
        run: cmake --build --preset fuzz --parallel 4
      - name: fuzz load_document (time-bounded)
        if: steps.clang.outputs.available == 'true'
        run: |
          ./build/fuzz/tests/arbc_fuzz_load_document \
            tests/fuzz/corpus/load_document \
            -max_total_time=300 -print_final_stats=1
      - name: upload crash reproducers
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: |
            crash-*
            timeout-*
            oom-*
          if-no-files-found: ignore
