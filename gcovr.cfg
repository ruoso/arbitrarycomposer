# gcovr configuration, auto-loaded from the --root directory (the CI coverage
# job runs `gcovr --root . ...`, so this file is picked up with no change to
# the workflow invocation).
#
# Disable gcovr's "suspicious hits" heuristic. gcc's gcov emits absurdly large
# (billions-scale) execution counts for some heavily-inlined header templates
# -- a known gcov bug, https://gcc.gnu.org/bugzilla/show_bug.cgi?id=68080. Our
# backend_cpu resampling kernels (`fetch_texel` fed as a `Fetch` lambda into the
# `arbc::media` bank's `sample_bicubic` / `decimate_half_band`) hit exactly this
# case, so gcov reports counts above gcovr's default 2**32 threshold and gcovr
# aborts the whole run (SuspiciousHits) before it can even write the coverage
# XML. Setting the threshold to 0 turns the detection off (parser check at
# gcovr/formats/gcov/parser/common.py: `threshold != 0 and hits >= threshold`).
#
# This does not weaken coverage measurement: a line with a corrupt-but-positive
# count still reads as covered (which it genuinely is -- those lines execute),
# and the diff-coverage gate still enforces 90% of changed lines. It is the
# gcov-bug workaround gcovr itself recommends in the abort message.
gcov-suspicious-hits-threshold = 0
